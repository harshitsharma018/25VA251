<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Var Data value Types in JS</title>
</head>
<body>

    <script>
      // JS Data Vlaue Types in JS
      //Primitive - single value variables which are immutable
      //String ,Number ,Boolean ,Undefined, Null , BigInt ,Symbol
      
      //string
      var myName ="Harshit"
      console.log(myName);
      console.log(typeof(myName));


      //Number
      var myMob=2973528334;
      console.log(myName +" mobile number is " + myMob);

     //Boolean
     var isMarried=true;
     console.log(myName + " is Married ? " + isMarried);


     //undefined
     var myEmail;
     console.log(myEmail);
     console.log(typeof(myEmail));

     //null
     var myAddress=null;
     console.log(myAddress);
     console.log(typeof(myAddress));

     //BigInt

     var myVal=BigInt(651234567896543456);
     console.log(myVal);
     console.log(typeof(myVal));

     //symbol
     var name1=Symbol("Harshit");
     var name2=Symbol("Harshit");
     console.log(name1==name2);


     //Reference(object) typed==mutable in memory and keep values in pair
     //object,function,array

     //objects are defined in pair of key and its value.

     let myInfo={
        name:"Harshit",
        age:19,
        isMarried:false,
        mob:8216389621,
        add:null,
        branch:"CSE",
        section:15
      };



      console.log(myInfo);
      console.log(myInfo.name); //access object's key i.e name

      //object length

      let keys = object.keys(myInfo);
      console.log("myInfo object length " + keys.length);

     //function -block of code that performs particular task

     function cal(){
        var num1=45;
        var num2=90;
        var res=num1+num2;
        console.log("Addition of two numbers is " + res);
        console.log(typeof(cal));
     }
     cal();


     // array - collection of any data in JS

     //for Similar data types
    
     //similar data types
       let vikasInfo = ["Raju",23,false,null,"cse",18];
     console.log(vikasInfo[1]);
     console.log(typeof(vikasInfo));
      //to iterate array numbers
      for(let i =0;i<vikasInfo.length;i++){
       console.log(vikasInfo[i]);
     };

    </script>
    
    
</body>
</html>
